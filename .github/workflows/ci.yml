name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Notify Telegram on failure
        if: failure()
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -c 100)
          BRANCH="${{ github.head_ref || github.ref_name }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=-1003671042608" \
            -d "parse_mode=Markdown" \
            -d "text=❌ *CI Failed* — \`n8n-TestHarness\`%0ABranch: \`${BRANCH}\`%0ACommit: ${COMMIT_MSG}%0A[View run](${RUN_URL})"

      - name: Notify Telegram on success
        if: success()
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -c 100)
          BRANCH="${{ github.head_ref || github.ref_name }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=-1003671042608" \
            -d "parse_mode=Markdown" \
            -d "text=✅ *CI Passed* — \`n8n-TestHarness\`%0ABranch: \`${BRANCH}\`%0ACommit: ${COMMIT_MSG}%0A[View run](${RUN_URL})"

